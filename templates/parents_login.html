<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Είσοδος Γονέων - Family Car Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Premium Background Gradient */
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            min-height: 100vh;
            transition: background 0.4s, color 0.4s; 
            opacity: 0;
            animation: fadeInPage 0.6s ease-out forwards;
        }
        
        @keyframes fadeInPage {
            to { opacity: 1; }
        }
        .animate-card {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Glassmorphism Navbar */
        .navbar { 
            background: rgba(52, 58, 64, 0.85) !important; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        /* Glassmorphism Card */
        .card { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            max-width: 400px; 
            margin: 0 auto; 
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        
        .btn-dark { 
            background: linear-gradient(135deg, #212529 0%, #343a40 100%); 
            border: none;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .btn-dark:hover {
            transform: translateY(-2px);
        }

        .input-group-text { background: transparent; border-right: none; border-radius: 10px 0 0 10px; color: #6c757d; }
        .has-icon .form-control { border-left: none; border-radius: 0 10px 10px 0; }

        /* DEEP SPACE DARK MODE */
        body.dark-mode { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: #f8f9fa; 
        }
        body.dark-mode .card { 
            background: rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        body.dark-mode .text-secondary { color: #cbd5e1 !important; }
        body.dark-mode .form-label { color: #f1f5f9; }
        body.dark-mode .form-control, body.dark-mode .input-group-text { 
            background: rgba(15, 23, 42, 0.6); 
            border-color: rgba(255, 255, 255, 0.1); 
            color: #fff; 
        }
        body.dark-mode .btn-dark { 
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); 
            color: #0f172a; 
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-car me-2"></i> Family Car Planner</a>
            <div class="ms-auto d-flex align-items-center">
                <button id="darkModeToggle" class="btn btn-outline-light btn-sm me-2" style="border-radius: 8px;"><i class="fa-solid fa-moon"></i></button>
                <a href="/" class="btn btn-outline-light btn-sm" style="border-radius: 8px;"><i class="fa-solid fa-house me-1"></i> Αρχική</a>
            </div>
        </div>
    </nav>

    <div class="container animate-card">
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div style="max-width: 400px; margin: 0 auto;">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} text-center shadow-sm mb-4" style="border-radius: 12px;" role="alert">
                {{ message }}
              </div>
            {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <div class="card p-4 mb-4" id="loginCard">
            <h3 class="text-center fw-bold text-secondary mb-4"><i class="fa-solid fa-lock me-2 text-warning"></i>Περιοχή Γονέων</h3>
            <form action="/parents" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Εισάγετε τον Κωδικό Πρόσβασης</label>
                    <div class="input-group has-icon">
                        <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                        <input type="password" class="form-control text-center" name="password" style="height: 45px;" placeholder="••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold py-2 mb-3"><i class="fa-solid fa-right-to-bracket me-2"></i>Είσοδος</button>
            </form>
            
            <div class="text-center">
                <button type="button" class="btn btn-link btn-sm text-decoration-none text-muted" onclick="toggleForms()"><i class="fa-solid fa-gear me-1"></i> Αλλαγή κωδικού</button>
            </div>
        </div>

        <div class="card p-4 d-none" id="changePasswordCard">
            <h3 class="text-center fw-bold text-secondary mb-4"><i class="fa-solid fa-key me-2"></i>Αλλαγή Κωδικού</h3>
            <form action="/parents/change-password" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Παλιός Κωδικός</label>
                    <input type="password" class="form-control" name="old_password" style="border-radius: 10px;" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Νέος Κωδικός</label>
                    <input type="password" class="form-control" name="new_password" style="border-radius: 10px;" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-2"><i class="fa-solid fa-floppy-disk me-2"></i>Αποθήκευση</button>
                <button type="button" class="btn btn-light w-100 btn-sm" style="border-radius: 10px;" onclick="toggleForms()">Ακύρωση</button>
            </form>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.getElementById('darkModeToggle');
            var icon = toggleBtn.querySelector('i');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                icon.className = 'fa-solid fa-sun';
            }
            toggleBtn.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                if (document.body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    icon.className = 'fa-solid fa-sun';
                } else {
                    localStorage.setItem('theme', 'light');
                    icon.className = 'fa-solid fa-moon';
                }
            });
        });

        function toggleForms() {
            var loginCard = document.getElementById('loginCard');
            var changePasswordCard = document.getElementById('changePasswordCard');
            
            if(loginCard.classList.contains('d-none')) {
                loginCard.classList.remove('d-none');
                changePasswordCard.classList.add('d-none');
            } else {
                loginCard.classList.add('d-none');
                changePasswordCard.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
