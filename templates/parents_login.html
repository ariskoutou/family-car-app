<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Είσοδος Γονέων</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px-6px rgba(0,0,0,0.05); max-width: 400px; width: 100%; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card p-4">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">🔒 Περιοχή Γονέων</h3>
            <p class="text-muted small">Εισάγετε τον κωδικό πρόσβασης για να διαχειριστείτε τα αιτήματα.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} text-center small py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/parents" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Κωδικός Πρόσβασης</label>
                <input type="password" name="password" class="form-control text-center" placeholder="••••" required autofocus>
            </div>
            <button type="submit" class="btn btn-dark w-100 fw-bold">Είσοδος</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">← Επιστροφή στην Αρχική</a>
        </div>
    </div>

</body>
</html>
