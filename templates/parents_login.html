<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Είσοδος Γονέων - Family Car Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .navbar { background-color: #343a40; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 400px; margin: 0 auto; transition: background-color 0.3s; }
        .btn-dark { background-color: #212529; }

        /* DARK MODE */
        body.dark-mode { background-color: #121212; color: #f8f9fa; }
        body.dark-mode .card { background-color: #1e1e1e; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        body.dark-mode .text-secondary { color: #e0e0e0 !important; }
        body.dark-mode .form-label { color: #f8f9fa; }
        body.dark-mode .form-control { background-color: #2d2d2d; border-color: #444; color: #fff; }
        body.dark-mode .btn-dark { background-color: #fff; color: #212529; border: none; }
        body.dark-mode .btn-dark:hover { background-color: #e0e0e0; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🚗 Family Car Planner</a>
            <div class="ms-auto d-flex align-items-center">
                <button id="darkModeToggle" class="btn btn-outline-light btn-sm me-2">🌙</button>
                <a href="/" class="btn btn-outline-light btn-sm">🏠 Αρχική</a>
            </div>
        </div>
    </nav>

    <div class="container">
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div style="max-width: 400px; margin: 0 auto;">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show text-center" role="alert">
                {{ message }}
              </div>
            {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <div class="card p-4 mb-4" id="loginCard">
            <h3 class="text-center fw-bold text-secondary mb-4">🔒 Περιοχή Γονέων</h3>
            <form action="/parents" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Εισάγετε τον Κωδικό Πρόσβασης</label>
                    <input type="password" class="form-control text-center" name="password" placeholder="••••" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold py-2 mb-3">Είσοδος</button>
            </form>
            
            <div class="text-center">
                <button type="button" class="btn btn-link btn-sm text-decoration-none text-muted" onclick="toggleForms()">⚙️ Αλλαγή κωδικού</button>
            </div>
        </div>

        <div class="card p-4 d-none" id="changePasswordCard">
            <h3 class="text-center fw-bold text-secondary mb-4">⚙️ Αλλαγή Κωδικού</h3>
            <form action="/parents/change-password" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Παλιός Κωδικός</label>
                    <input type="password" class="form-control" name="old_password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Νέος Κωδικός</label>
                    <input type="password" class="form-control" name="new_password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-2">Αποθήκευση Νέου Κωδικού</button>
                <button type="button" class="btn btn-light w-100 btn-sm" onclick="toggleForms()">Ακύρωση</button>
            </form>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.getElementById('darkModeToggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = '☀️';
            }
            toggleBtn.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                if (document.body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    toggleBtn.textContent = '☀️';
                } else {
                    localStorage.setItem('theme', 'light');
                    toggleBtn.textContent = '🌙';
                }
            });
        });

        function toggleForms() {
            var loginCard = document.getElementById('loginCard');
            var changePasswordCard = document.getElementById('changePasswordCard');
            
            if(loginCard.classList.contains('d-none')) {
                loginCard.classList.remove('d-none');
                changePasswordCard.classList.add('d-none');
            } else {
                loginCard.classList.add('d-none');
                changePasswordCard.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
