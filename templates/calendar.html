<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Πρόγραμμα Αυτοκινήτου - Family Car Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .navbar { background-color: #343a40; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: background-color 0.3s; }
        
        /* DARK MODE ΓΙΑ ΤΟ ΗΜΕΡΟΛΟΓΙΟ */
        body.dark-mode { background-color: #121212; color: #f8f9fa; }
        body.dark-mode .card { background-color: #1e1e1e; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        body.dark-mode .text-secondary { color: #e0e0e0 !important; }
        body.dark-mode .fc { color: #fff; }
        body.dark-mode .fc td, body.dark-mode .fc th { border-color: #444 !important; }
        body.dark-mode .fc-theme-standard .fc-scrollgrid { border-color: #444 !important; }
        body.dark-mode .fc-col-header-cell { background-color: #2d2d2d; }
        body.dark-mode .fc-daygrid-day { background-color: #1e1e1e; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🚗 Family Car Planner</a>
            <div class="ms-auto d-flex align-items-center">
                <button id="darkModeToggle" class="btn btn-outline-light btn-sm me-2">🌙</button>
                <a href="/" class="btn btn-outline-light btn-sm">🏠 Αρχική</a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="card p-4">
            <h2 class="fw-bold text-secondary mb-4 text-center">📅 Εβδομαδιαίο Πρόγραμμα Χρήσης</h2>
            <div id="calendar"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Λειτουργικότητα Dark Mode
            var toggleBtn = document.getElementById('darkModeToggle');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                toggleBtn.textContent = '☀️';
            }
            toggleBtn.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                if (document.body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    toggleBtn.textContent = '☀️';
                } else {
                    localStorage.setItem('theme', 'light');
                    toggleBtn.textContent = '🌙';
                }
            });

            var calendarEl = document.getElementById('calendar');
            var eventsData = {{ events_json|safe }};

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'el',
                firstDay: 1, 
                allDaySlot: false,
                slotMinTime: '07:00:00',
                slotMaxTime: '24:00:00',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'timeGridWeek,dayGridMonth'
                },
                buttonText: {
                    today: 'Σήμερα',
                    month: 'Μήνας',
                    week: 'Εβδομάδα'
                },
                events: eventsData,
                eventClick: function(info) {
                    if(info.event.extendedProps.description) {
                        alert("Σκοπός: " + info.event.extendedProps.description);
                    }
                }
            });

            calendar.render();
        });
    </script>
</body>
</html>
